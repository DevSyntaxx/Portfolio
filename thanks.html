<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado | Felipe Morais</title>
    <link rel="stylesheet" href="index.css?v=2.0">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Calendly link widget begin -->
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
    <script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript" async></script>
    <!-- Calendly link widget end -->
    <style>
        .thanks-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }
        .thanks-icon {
            width: 80px;
            height: 80px;
            background: var(--accent-gold-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <section class="thanks-section">
        <div class="thanks-icon">
            <i data-lucide="check" style="width: 40px; height: 40px;"></i>
        </div>
        <h1 style="font-size: 3.5rem; font-weight: 300; margin-bottom: 20px;">Sua solicitação foi enviada!</h1>
        <p style="font-size: 1.2rem; color: var(--text-secondary); max-width: 600px; margin-bottom: 40px;">
            Obrigado pelo interesse. Em menos de 24 horas entrarei em contato pessoalmente para darmos o próximo passo na transformação do seu negócio.
        </p>
        <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
            <a href="javascript:void(0);" onclick="Calendly.initPopupWidget({url: 'https://calendly.com/soufelipemorais/30min'});return false;" class="btn btn-gold">Deseja acelerar? Agendar reunião agora</a>
            <a href="index.html" class="btn btn-secondary">Voltar para o site</a>
        </div>
    </section>

    <script src="index.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
